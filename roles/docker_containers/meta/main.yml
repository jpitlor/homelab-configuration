dependencies:
  - role: geerlingguy.swap
    become: true
    vars:
      swap_file_state: absent
  - role: geerlingguy.containerd
    become: true
  - role: uchida.nvidia-container-runtime
    become: true
  - role: xanmanning.k3s
    vars:
      k3s_become: true
      k3s_agent:
        with-node-id: true
        node-label: "{% if inventory_hostname is search('zotac*') %}['gpu_instance={{ inventory_hostname }}']{% else %}[]{% endif %}"
      
