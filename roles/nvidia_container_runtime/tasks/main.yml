---

- name: Install required system packages
  become: true
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - curl
      - gnupg2
    state: latest
    update_cache: true

- name: Add nvidia repository
  become: true
  ansible.builtin.deb822_repository:
    name: nvidia-container
    uris: "https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH)"
    signed_by: https://nvidia.github.io/libnvidia-container/gpgkey
    suites: ["/"]

- name: Ensure contrib and non-free are enabled in sources.list
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/apt/sources.list
    regexp: '^(deb(?:-src)?\s+.*?)(?:\s+main|\s+main\s+restricted|\s+main\s+restricted\s+universe\s+multiverse)?(?!\s+contrib)(?!\s+non-free).*$'
    replace: '\\1 main contrib non-free'
    backrefs: true
    state: present

- name: Install CUDA keyring 
  become: true
  ansible.builtin.apt:
    deb: https://developer.download.nvidia.com/compute/cuda/repos/debian12/x86_64/cuda-keyring_1.1-1_all.deb

- name: Install drivers and container runtime
  become: true
  ansible.builtin.apt:
    pkg:
      - nvidia-container-toolkit
      - nvidia-container-toolkit-base
      - libnvidia-container-tools
      - libnvidia-container1
      - nvidia-container-runtime 
      - cuda-toolkit
    state: latest
    update_cache: true

- name: Configure runtime
  become: true
  ansible.builtin.shell: nvidia-ctk runtime configure --runtime=containerd

- name: Restart containerd
  become: true
  ansible.builtin.shell: systemctl restart containerd
