---

- name: Install required system packages
  become: true
  ansible.builtin.apt:
    pkg:
      - ca-certificates
      - curl
      - gnupg2
    state: latest
    update_cache: true

# - name: Add nvidia apt repository key.
#   ansible.builtin.get_url:
#     url: "{{ jenkins_repo_key_url }}"
#     dest: /etc/apt/trusted.gpg.d/jenkins.asc
#     mode: '0644'
#     force: true

- name: Add nvidia repository
  become: true
  ansible.builtin.deb822_repository:
    name: nvidia-container
    uris: https://nvidia.github.io/libnvidia-container/stable/deb/x86_64
    signed_by: https://nvidia.github.io/libnvidia-container/gpgkey
    components: [binary]
    suites: [binary]

- name: Install drivers and container runtime
  become: true
  ansible.builtin.apt:
    pkg:
      - nvidia-container-toolkit={{ nvidia_container_toolkit_version }}
      - nvidia-container-toolkit-base={{ nvidia_container_toolkit_version }}
      - libnvidia-container-tools={{ nvidia_container_toolkit_version }}
      - libnvidia-container1={{ nvidia_container_toolkit_version }}
      - nvidia-container-runtime 
      - cuda-drivers-fabricmanager-515 
      - nvidia-headless-515-server
    state: latest
    update_cache: true